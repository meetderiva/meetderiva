name: Check Icons

on:
  push:
    branches: [main]
    paths: ["README.md"]
  pull_request:
    branches: [main]
    paths: ["README.md"]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check icon URLs
        run: python scripts/check-icons.py
